<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotS Overlay</title>
  <link rel="stylesheet" href="/css/overlay.css">
</head>
<body>
  <div id="overlay">
    <div id="stats-bar">
      <span id="mode-label" class="stat mode-label"></span>
      <span class="stat-sep">&ndash;</span>
      <span id="win-count" class="stat win">0W</span>
      <span class="stat-sep">&ndash;</span>
      <span id="loss-count" class="stat loss">0L</span>
      <span class="stat-sep">|</span>
      <span id="win-rate" class="stat rate">0%</span>
    </div>
    <div id="game-row"></div>
  </div>
  <script src="/js/overlay.js"></script>
</body>
</html>

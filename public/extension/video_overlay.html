<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotS Match History</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
#sidebar { position: fixed; top: 0; right: 0; width: 420px; height: 100%; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 4px; padding: 8px 6px; scrollbar-width: none; opacity: 1; transition: opacity 0.5s ease; }
#sidebar::-webkit-scrollbar { display: none; }
#sidebar.hidden { opacity: 0; pointer-events: none; }
#pull-tab { position: fixed; top: 0; right: 0; width: 40px; height: 100%; cursor: pointer; z-index: 200; background: transparent; }
.game-card { position: relative; border-radius: 6px; overflow: hidden; background: rgba(10, 10, 20, 0.93); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(4px); padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
.game-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: scale(1.02); }
.game-card::before { content: ''; position: absolute; inset: 0; background-image: var(--map-img); background-size: cover; background-position: center; opacity: 0.18; z-index: 0; }
.game-card > * { position: relative; z-index: 1; }
.card-header { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; }
.card-map-name { font-size: 11px; font-weight: 700; color: rgba(255, 255, 255, 0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.card-center-info { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.card-right-info { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
.card-mode { font-size: 9px; color: rgba(255, 255, 255, 0.45); white-space: nowrap; }
.card-time { font-size: 9px; color: rgba(255, 255, 255, 0.35); white-space: nowrap; }
.result-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 0; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
.result-badge.win { color: #4ade80; }
.result-badge.loss { color: #f87171; }
.card-duration { font-size: 9px; color: rgba(255, 255, 255, 0.45); }
.card-teams { display: flex; align-items: center; justify-content: center; gap: 8px; }
.hero-row { display: flex; gap: 2px; justify-content: center; flex-shrink: 0; }
.card-vs { font-size: 9px; font-weight: 600; color: rgba(255, 255, 255, 0.25); flex-shrink: 0; }
.hero-icon { position: relative; width: 32px; height: 32px; border-radius: 4px; overflow: visible; flex-shrink: 0; }
.hero-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1.5px solid rgba(255, 255, 255, 0.15); display: block; background: #1a1a2e; }
.hero-icon.is-me img { border-color: #a78bfa; box-shadow: 0 0 6px 1px rgba(167, 139, 250, 0.7); }
.hero-row.their-team .hero-icon img { opacity: 0.75; border-color: rgba(255, 255, 255, 0.08); }
.hero-icon .tooltip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.88); color: #e5e7eb; font-size: 10px; white-space: nowrap; padding: 3px 6px; border-radius: 3px; pointer-events: none; z-index: 100; border: 1px solid rgba(255,255,255,0.12); }
.hero-icon:hover .tooltip { display: block; }
#game-list:empty::after { content: 'No games yet today'; display: block; color: rgba(255,255,255,0.3); font-size: 10px; text-align: center; margin-top: 12px; }
#detail-view { display: none; flex-direction: column; gap: 8px; padding: 8px 6px; position: fixed; top: 0; right: 0; width: 420px; height: 100%; overflow-y: auto; scrollbar-width: none; animation: slideIn 0.3s ease; opacity: 1; transition: opacity 0.5s ease; }
#detail-view::-webkit-scrollbar { display: none; }
#detail-view.active { display: flex; }
#detail-view.hidden { opacity: 0; pointer-events: none; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.detail-back { display: flex; align-items: center; gap: 6px; background: none; border: none; color: rgba(255, 255, 255, 0.6); font-size: 12px; cursor: pointer; padding: 4px 0; transition: color 0.2s; }
.detail-back:hover { color: #fff; }
.detail-back::before { content: '\2190'; font-size: 16px; }
.detail-header { position: relative; border-radius: 8px; overflow: hidden; padding: 16px 12px; background: rgba(10, 10, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); text-align: center; }
.detail-header::before { content: ''; position: absolute; inset: 0; background-image: var(--map-img); background-size: cover; background-position: center; opacity: 0.25; z-index: 0; }
.detail-header > * { position: relative; z-index: 1; }
.detail-map-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.detail-meta { font-size: 11px; color: rgba(255, 255, 255, 0.5); }
.detail-result { font-size: 20px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; }
.detail-result.win { color: #4ade80; }
.detail-result.loss { color: #f87171; }
.detail-team { background: rgba(10, 10, 20, 0.6); border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.06); padding: 8px; }
.detail-team-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255, 255, 255, 0.4); margin-bottom: 6px; }
.detail-player { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.detail-player .hero-icon { width: 36px; height: 36px; }
.detail-player-name { font-size: 12px; color: rgba(255, 255, 255, 0.8); }
.detail-player.is-me .detail-player-name { color: #a78bfa; font-weight: 600; }
.detail-player-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.talent-row { display: flex; gap: 2px; }
.talent-icon { position: relative; width: 22px; height: 22px; border-radius: 3px; overflow: visible; flex-shrink: 0; }
.talent-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; border: 1px solid rgba(255, 255, 255, 0.12); display: block; background: #1a1a2e; }
.talent-icon .tooltip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.92); color: #e5e7eb; font-size: 10px; white-space: nowrap; padding: 3px 6px; border-radius: 3px; pointer-events: none; z-index: 100; border: 1px solid rgba(255,255,255,0.12); }
.talent-icon:hover .tooltip { display: block; }
.session-record { color: rgba(255, 255, 255, 0.7); font-size: 12px; font-weight: 600; text-align: center; padding: 4px 0; }
.session-heroes { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
.xp-graph-section { position: relative; background: rgba(10, 10, 20, 0.6); border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.06); padding: 8px; margin-top: 4px; }
.xp-graph-section canvas { width: 100%; display: block; }
  </style>
</head>
<body>
  <div id="pull-tab"></div>
  <aside id="sidebar">
    <div id="session-stats"></div>
    <div id="game-list"></div>
  </aside>
  <div id="detail-view"></div>
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <script src="js/xp-graph.js"></script>
  <script src="js/overlay.js"></script>
</body>
</html>

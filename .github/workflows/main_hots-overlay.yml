# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - hots-overlay

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: hotsoverlay.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C19D3ADBF8DF4933B190B8559778D266 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_CF9A62E1AF824C9EBEC0928A69486D82 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: hotsoverlay.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C19D3ADBF8DF4933B190B8559778D266 }}/hotsoverlay/hots-overlay:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2ABFFA7AAA5044168504DB869074C7CF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E01AFB223FE749CB9FA98E58095DB392 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D683073A2B06443D83B0672A64DF65EB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'hots-overlay'
          slot-name: 'Production'
          images: 'hotsoverlay.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C19D3ADBF8DF4933B190B8559778D266 }}/hotsoverlay/hots-overlay:${{ github.sha }}'
          
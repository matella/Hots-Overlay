# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - hots-overlay

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: hotsoverlay.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_949453BA36F8407E9D05006DD18DBE83 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_516DC84DDDF04A13925417188986881B }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: hotsoverlay.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_949453BA36F8407E9D05006DD18DBE83 }}/hots-overlay:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_796F29EC1CB144F5AE5687AB5BA7F29D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B78C451D8065439EBE5CC63DB00BEE5D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_927C30A096BA45C19BE68ED0F80C55AE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'hots-overlay'
          slot-name: 'Production'
          images: 'hotsoverlay.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_949453BA36F8407E9D05006DD18DBE83 }}/hots-overlay:${{ github.sha }}'
          
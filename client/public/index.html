<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotS Replay Client</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <header>
    <h1>HotS Replay Client</h1>
    <nav>
      <button class="nav-btn active" data-page="dashboard">Dashboard</button>
      <button class="nav-btn" data-page="settings">Settings</button>
    </nav>
  </header>

  <main id="page-dashboard" class="page active">
    <section class="status-cards">
      <div class="card" id="card-server">
        <div class="card-dot" id="dot-server"></div>
        <div class="card-label">Server</div>
        <div class="card-value" id="val-server">&mdash;</div>
      </div>
      <div class="card" id="card-watcher">
        <div class="card-dot" id="dot-watcher"></div>
        <div class="card-label">Watcher</div>
        <div class="card-value" id="val-watcher">&mdash;</div>
      </div>
      <div class="card" id="card-uploads">
        <div class="card-icon">&uarr;</div>
        <div class="card-label">Uploaded</div>
        <div class="card-value" id="val-uploads">0</div>
      </div>
    </section>

    <section class="bulk-progress" id="bulk-progress" hidden>
      <div class="progress-label">
        Uploading: <span id="bulk-done">0</span> / <span id="bulk-total">0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="bulk-fill"></div>
      </div>
    </section>

    <section class="log-section">
      <h2>Recent Activity</h2>
      <div class="log-list" id="log-list">
        <div class="log-empty">No uploads yet.</div>
      </div>
    </section>
  </main>

  <main id="page-settings" class="page">
    <section class="settings-form">
      <h2>Settings</h2>

      <div class="form-group">
        <label for="input-replay-dir">Replay Directory</label>
        <div class="input-row">
          <input type="text" id="input-replay-dir" placeholder="C:\Users\...\Replays\Multiplayer" spellcheck="false">
          <button id="btn-browse" class="btn-browse" title="Browse...">Browse</button>
        </div>
        <div class="form-hint" id="hint-replay-dir"></div>
      </div>

      <div class="form-actions">
        <button id="btn-save" class="btn-primary">Save</button>
      </div>

      <div class="form-message" id="save-message"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>

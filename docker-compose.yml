services:
  overlay:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - overlay-data:/app/data
    environment:
      - TOON_HANDLE=${TOON_HANDLE}
      - PORT=${PORT:-8080}
      - REPLAY_DIR=/app/replays
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - GAME_MODE=${GAME_MODE:-Storm League}
      - MODE_LABEL_Custom=${MODE_LABEL_Custom:-}
      - TZ=${TZ:-America/New_York}
    restart: unless-stopped

volumes:
  overlay-data:
